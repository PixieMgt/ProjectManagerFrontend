name: Deploy Frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=http://backend:5000/api \
            -t ghcr.io/${{ secrets.GHCR_USERNAME }}/projectmanagerfrontend:latest \
            ./frontend

      - name: Push Docker image
        run: docker push ghcr.io/${{ secrets.GHCR_USERNAME }}/projectmanagerfrontend:latest

      - name: Connect to server via Tailscale
        run: |
          sudo tailscale up --authkey ${{ secrets.TS_KEY }}

      - name: Deploy to Kubernetes
        run: |
          ssh -o StrictHostKeyChecking=no projectmanager@${{ secrets.TS_VM_IP }} "
            kubectl set image deployment/frontend frontend=ghcr.io/${{ secrets.GHCR_USERNAME }}/projectmanagerfrontend:latest -n production &&
            kubectl rollout status deployment/frontend -n production
          "
