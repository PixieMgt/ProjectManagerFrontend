name: Deploy Frontend

on:
  push:
    branches: [ "main" ]
    paths:
      - "frontend/**"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=http://backend:5000/api \
            -t ghcr.io/pixiemgt/projectmanagerfrontend:latest \
            ./frontend

      - name: Push Docker image
        run: docker push ghcr.io/pixiemgt/projectmanagerfrontend:latest

      - name: Connect to server via Tailscale
        run: |
          sudo tailscale up --authkey ${{ secrets.TS_AUTHKEY }}

      - name: Deploy to Kubernetes
        run: |
          ssh -o StrictHostKeyChecking=no projectmanager@<YOUR-TS-HOST> "
            kubectl set image deployment/frontend frontend=ghcr.io/pixiemgt/projectmanagerfrontend:latest -n production &&
            kubectl rollout status deployment/frontend -n production
          "
